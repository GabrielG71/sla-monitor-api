spring:
  application:
    name: ingestor-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/slamonitor}
    username: ${SPRING_DATASOURCE_USERNAME:sla}
    password: ${SPRING_DATASOURCE_PASSWORD:sla}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

polling:
  default-interval-secs: ${POLLING_DEFAULT_INTERVAL_SECS:60}
  default-timeout-ms: ${POLLING_DEFAULT_TIMEOUT_MS:5000}
  max-concurrent: ${POLLING_MAX_CONCURRENT:50}
  scheduler-tick-ms: ${POLLING_SCHEDULER_TICK_MS:10000}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: false
